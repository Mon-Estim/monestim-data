<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirection…</title>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;
       font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;}
  .msg{text-align:center;}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);
           border-top-color:#c9a96e;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  p{font-size:14px;color:rgba(255,255,255,0.5);margin:0;}
</style>
</head>
<body>
<div class="msg"><div class="spinner"></div><p>Redirection en cours…</p></div>
<script>
(function() {
  var params    = new URLSearchParams(window.location.search);
  var stripeUrl = params.get('stripe');
  var payload   = params.get('d');
  var offer     = params.get('offer') || 'basic';

  // ── CAS 1 : avant Stripe ──
  if (stripeUrl) {
    if (payload) {
      try { localStorage.setItem('monestim_payload', payload); } catch(e) {}
    }
    window.location.href = decodeURIComponent(stripeUrl);
    return;
  }

  // ── CAS 2 : retour de Stripe ──
  var stored = '';
  try { stored = localStorage.getItem('monestim_payload') || ''; } catch(e) {}

  if (stored) {
    // Injecte l'offre correcte
    try {
      var data = JSON.parse(decodeURIComponent(escape(atob(stored))));
      if (data.offer !== 'premium') { data.offer = offer; }
      stored = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    } catch(e) {}
    try { localStorage.removeItem('monestim_payload'); } catch(e) {}
    // Redirige vers Systeme.io avec payload dans le hash
    window.location.href = 'https://www.mon-estim.fr/votre-estimation#d=' + encodeURIComponent(stored);
  } else {
    // Pas de payload — redirige quand même avec offer pour debug
    window.location.href = 'https://www.mon-estim.fr/votre-estimation#lost=1&offer=' + offer;
  }
})();
</script>
</body>
</html>
