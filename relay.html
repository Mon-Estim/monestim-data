<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirection…</title>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;
       font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;text-align:center;padding:20px;}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);
           border-top-color:#c9a96e;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  p{font-size:14px;color:rgba(255,255,255,0.5);margin:0;}
  .error{display:none;}
  .error p{color:rgba(255,255,255,0.7);font-size:15px;line-height:1.7;margin-bottom:8px;}
  .btn{display:inline-block;background:#c9a96e;color:#000;padding:14px 32px;border-radius:10px;
       text-decoration:none;font-weight:700;font-size:15px;margin-top:20px;}
</style>
</head>
<body>
<div>
  <div id="loading">
    <div class="spinner"></div>
    <p>Récupération de votre estimation…</p>
  </div>
  <div id="error" class="error">
    <p style="font-size:24px;margin-bottom:12px;">⚠️</p>
    <p><strong style="color:#fff;">Votre paiement a bien été pris en compte.</strong></p>
    <p>Votre session a expiré pendant la redirection.<br>
       Retournez sur MonEstim et relancez votre estimation — elle sera gratuite.</p>
    <a href="https://www.mon-estim.fr/" class="btn">← Retour à MonEstim</a>
  </div>
</div>
<script>
(function() {
  var params    = new URLSearchParams(window.location.search);
  var stripeUrl = params.get('stripe');
  var payload   = params.get('d');
  var offer     = params.get('offer') || 'basic';

  // ── CAS 1 : avant Stripe (questionnaire → relay → Stripe) ──
  if (stripeUrl) {
    if (payload) {
      try { localStorage.setItem('monestim_payload', payload); } catch(e) {}
      try { sessionStorage.setItem('monestim_payload_stripe', payload); } catch(e) {}
    }
    window.location.href = decodeURIComponent(stripeUrl);
    return;
  }

  // ── CAS 2 : retour de Stripe ──
  // Lire le payload stocké avant Stripe
  // Ordre : localStorage (desktop) → sessionStorage (iOS navigation privée)
  var stored = '';
  try { stored = localStorage.getItem('monestim_payload') || ''; } catch(e) {}
  if (!stored) {
    try { stored = sessionStorage.getItem('monestim_payload_stripe') || ''; } catch(e) {}
  }

  // Nettoyer les deux storages
  try { localStorage.removeItem('monestim_payload'); } catch(e) {}
  try { sessionStorage.removeItem('monestim_payload_stripe'); } catch(e) {}

  if (stored) {
    // Injecter l'offre correcte (basic ou premium selon success_url Stripe configurée)
    try {
      var data = JSON.parse(decodeURIComponent(escape(atob(stored))));
      data.offer = offer;
      stored = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    } catch(e) {}
    window.location.href = 'https://mon-estim.github.io/monestim-data/resultats.html?d=' + encodeURIComponent(stored);
  } else {
    // Payload perdu — afficher message d'erreur clair
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
})();
</script>
</body>
</html>
